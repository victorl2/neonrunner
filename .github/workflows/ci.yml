# Phase 1 CI workflow.
# Required-check job names (must NOT be renamed without updating branch protection — Pitfall 9):
#   - iron-build
#   - worker-test
#   - worker-lint
#   - smoke
# Deploy jobs:
#   - deploy-production (main branch push only, gated on all 4 required)
#   - deploy-preview    (PRs + non-main pushes, gated on all 4 required)
# Reference: RESEARCH.md Pattern 4. Iron's web.yml is the literal blueprint for the iron-build job.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Required check #1: Iron build verifies dist/web/ artifacts ──────────────
  iron-build:
    runs-on: ubuntu-latest
    outputs:
      dist-sha: ${{ steps.dist.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Read pinned Iron version
        id: iron_version
        run: echo "version=$(cat .iron-version)" >> "$GITHUB_OUTPUT"

      - name: Read pinned emsdk version
        id: emsdk_version
        run: echo "version=$(cat .emsdk-version 2>/dev/null || echo '4.0.23')" >> "$GITHUB_OUTPUT"

      - name: Install emsdk ${{ steps.emsdk_version.outputs.version }}
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ steps.emsdk_version.outputs.version }}
          actions-cache-folder: emsdk-cache

      - name: Verify emcc version pin
        run: emcc --version | grep -F "${{ steps.emsdk_version.outputs.version }}"

      - name: Install Iron ${{ steps.iron_version.outputs.version }}
        run: |
          curl --proto '=https' --tlsv1.2 -sSfL https://ironlang.dev/install.sh \
            | sh -s -- --version "${{ steps.iron_version.outputs.version }}"
          echo "$HOME/.iron/bin" >> "$GITHUB_PATH"

      - name: Verify iron --version pin
        run: iron --version

      - name: Build (debug for sourcemap)
        run: bash scripts/build.sh

      - name: Verify dist/web artifacts
        id: dist
        run: |
          bash scripts/verify-dist.sh
          echo "sha=$(sha256sum dist/web/index.wasm | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-web
          path: dist/web
          retention-days: 7

  # ── Required check #2: Worker tests (vitest in workerd) ─────────────────────
  worker-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - run: npx vitest run

  # ── Required check #3: TypeScript lint ──────────────────────────────────────
  worker-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  # ── Required check #4: Playwright headless smoke ────────────────────────────
  smoke:
    runs-on: ubuntu-latest
    needs: iron-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: actions/download-artifact@v4
        with:
          name: dist-web
          path: dist/web
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test --config tests/e2e/playwright.config.ts --project=chromium

  # ── Deploy gate (main only) ─────────────────────────────────────────────────
  deploy-production:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [iron-build, worker-test, worker-lint, smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist-web
          path: dist/web
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json
      - name: Install worker deps
        working-directory: worker
        run: npm ci
      - name: Wrangler deploy (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy

  # ── Preview deploy (non-main branches + PRs) ────────────────────────────────
  deploy-preview:
    if: github.event_name == 'pull_request' || (github.ref != 'refs/heads/main' && github.event_name == 'push')
    needs: [iron-build, worker-test, worker-lint, smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist-web
          path: dist/web
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json
      - name: Install worker deps
        working-directory: worker
        run: npm ci

      - name: Wrangler versions upload (preview)
        id: preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: versions upload --preview-alias pr-${{ github.event.pull_request.number || github.run_id }} --message "ci preview ${{ github.sha }}"

      - name: Extract preview URL from wrangler stdout
        id: url
        run: |
          # wrangler-action's deployment-url output is unreliable for `versions upload`
          # (cloudflare/wrangler-action#343); parse from command-output instead.
          URL=$(echo '${{ steps.preview.outputs.command-output }}' | awk '/Version Preview URL:/ {print $NF}' | head -1)
          if [ -z "$URL" ]; then
            URL=$(echo '${{ steps.preview.outputs.command-output }}' | awk '/Preview URL:/ {print $NF}' | head -1)
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && steps.url.outputs.url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const url = "${{ steps.url.outputs.url }}";
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Preview deploy ready: ${url}`
            });
